services:
  # Backend Web Service
  - type: web
    name: parental-legacy-calculator-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: parental-legacy-calculator-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html